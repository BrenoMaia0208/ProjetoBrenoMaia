<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão de Pedidos de Venda</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo-dbd5cd89.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-body">
    <div id="loading-overlay">
        <div class="spinner"></div>
    </div>
    
    <div id="login-container" class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="assets/logo-dbd5cd89.svg" alt="Logo da Empresa" style="height: 50px; margin-bottom: 15px; width: auto;">
                <h2>Portal de Vendas</h2>
                <p>Faça login para acessar o dashboard</p>
            </div>
            
            <div id="auth-error" class="auth-error hidden"></div>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" id="login-btn" class="btn-primary">Entrar</button>
            </form>
            
            <form id="register-form" class="hidden">
                <div class="input-group">
                    <label for="register-email">E-mail</label>
                    <input type="email" id="register-email" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label for="register-password">Senha</label>
                    <input type="password" id="register-password" placeholder="••••••••" required>
                </div>
                <div class="input-group">
                    <label for="register-password-confirm">Confirmar Senha</label>
                    <input type="password" id="register-password-confirm" placeholder="••••••••" required>
                </div>
                <button type="submit" id="register-btn" class="btn-primary">Criar Conta</button>
            </form>
            
            <div class="auth-footer">
                <a href="#" id="toggle-auth-link">Não tem uma conta? Registre-se</a>
            </div>
        </div>
    </div>
    
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
